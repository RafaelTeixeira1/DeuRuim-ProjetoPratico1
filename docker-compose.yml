services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        UID: 1000
        GID: 1000
    container_name: deuruim_app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public

  db:
    image: mariadb:11
    container_name: deuruim_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: deuruim
      MARIADB_USER: deuruim
      MARIADB_PASSWORD: deuruim
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: deuruim_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - db
  
  node:
    image: node:20
    container_name: deuruim_node
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
  
volumes:
  dbdata:
